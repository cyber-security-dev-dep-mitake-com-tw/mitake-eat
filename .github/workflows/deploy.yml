name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Remove middleware for static export
        run: rm -f src/middleware.ts

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Create root redirect to default locale
        run: |
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="utf-8">
            <title>Mitake Eat</title>
            <script>window.location.href="/mitake-eat/zh-TW/"</script>
            <meta http-equiv="refresh" content="0;url=/mitake-eat/zh-TW/">
          </head>
          <body></body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
